services:
  - type: web
    name: smart-vehicle-backend
    env: python
    buildCommand: pip install -r requirements.txt
    # Safe Render start command: 2 workers (fits starter RAM), UvicornWorker for async FastAPI
    startCommand: gunicorn backend.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5
    rootDir: .
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      # IMPORTANT: Set this to your Vercel frontend URL (e.g. https://your-app.vercel.app)
      - key: APP_URL
        sync: false
      # Comma-separated list of allowed frontend origins (your Vercel URL)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_NAME
        value: SmartInsure
      - key: FROM_NAME
        value: SmartInsure Security
      # Session expiry settings
      - key: ADMIN_TOKEN_EXPIRE_HOURS
        value: 48
      - key: WORKER_TOKEN_EXPIRE_HOURS
        value: 3
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      # SMTP — leave blank to use dev/test mode (OTPs in API response)
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      # Redis — optional, leave blank if not using Redis on Render
      - key: REDIS_URL
        sync: false
      # ── AWS S3 for PDF Storage ─────────────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: PDF_SIGNED_URL_EXPIRY
        value: 3600
