---
# SmartInsure API Deployment for Kubernetes
# Deploy with: kubectl apply -f k8s-deployment.yaml

# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: smartinsure
  labels:
    name: smartinsure

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: smartinsure
data:
  LOG_LEVEL: "INFO"
  WORKERS_COUNT: "16"
  WORKER_TIMEOUT: "120"

---
# Secrets for sensitive data (create separately!)
# kubectl create secret generic db-secrets \
#   --from-literal=mongo-uri='mongodb+srv://...' \
#   --from-literal=redis-url='redis://...' \
#   -n smartinsure

---
# API Deployment with auto-scaling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartinsure-api
  namespace: smartinsure
  labels:
    app: smartinsure-api
    version: v1
spec:
  replicas: 5  # Initial replicas, will be controlled by HPA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: smartinsure-api
  template:
    metadata:
      labels:
        app: smartinsure-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Anti-affinity: spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - smartinsure-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: api
        image: smartinsure:api-v1
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Resource requests & limits
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        # Environment variables
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: mongo-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: redis-url
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: celery-broker-url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: LOG_LEVEL
        - name: WORKERS_COUNT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: WORKERS_COUNT
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        
        # Volume mounts
        volumeMounts:
        - name: app-logs
          mountPath: /var/log/smartinsure
      
      volumes:
      - name: app-logs
        emptyDir: {}

---
# Service to expose API internally
apiVersion: v1
kind: Service
metadata:
  name: smartinsure-api-service
  namespace: smartinsure
  labels:
    app: smartinsure-api
spec:
  type: ClusterIP
  selector:
    app: smartinsure-api
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartinsure-api-hpa
  namespace: smartinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartinsure-api
  minReplicas: 5
  maxReplicas: 50
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Max

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartinsure-ingress
  namespace: smartinsure
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
  - hosts:
    - api.smartinsure.com
    secretName: smartinsure-tls
  rules:
  - host: api.smartinsure.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: smartinsure-api-service
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: smartinsure-api-service
            port:
              number: 8000

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: smartinsure-api
  namespace: smartinsure
  labels:
    app: smartinsure-api
spec:
  selector:
    matchLabels:
      app: smartinsure-api
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: smartinsure-api-pdb
  namespace: smartinsure
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: smartinsure-api
